name: Sync Booking Calendar

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync-bookings.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch private iCal feed
        env:
          ICAL_URL: ${{ secrets.POHARA_ICAL_URL }}
        run: |
          test -n "$ICAL_URL"
          curl -fsSL "$ICAL_URL" -o assets/bookings-live.ics
          test -s assets/bookings-live.ics

      - name: Commit if changed
        run: |
          git config user.name "oc-bot"
          git config user.email "oc@openclaw.ai"
          git add assets/bookings-live.ics
          git diff --quiet --cached || git commit -m "Sync bookings calendar $(date '+%Y-%m-%d %H:%M')"
          git push
