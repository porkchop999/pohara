<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="copyright" content="© pohara.co.nz">
  <meta name="description" content="Search the Pohara website for accommodation, beaches, cafes, walks, wildlife, wineries and local Golden Bay tips." />
  <link rel="canonical" href="https://porkchop999.github.io/pohara/search.html" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Search Pohara Website",
      "url": "https://porkchop999.github.io/pohara/search.html",
      "description": "Search the Pohara website for accommodation, local recommendations and Golden Bay travel tips."
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {"@type": "ListItem", "position": 1, "name": "Home", "item": "https://porkchop999.github.io/pohara/"},
        {"@type": "ListItem", "position": 2, "name": "Search", "item": "https://porkchop999.github.io/pohara/search.html"}
      ]
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ocean:#1a4a6e;
      --ocean-lt:#2a6a8e;
      --sand:#e8d5b7;
      --sand-lt:#f5ead8;
      --sage:#7a9e7e;
      --cream:#faf8f5;
      --charcoal:#2d3436;
      --stone:#636e72;
      --white:#ffffff;
      --shadow:0 4px 20px rgba(0,0,0,0.08);
      --shadow-md:0 10px 30px rgba(0,0,0,0.12);
      --radius:12px;
      --font-head:'Quicksand', -apple-system, sans-serif;
      --font-body:'Lato', -apple-system, sans-serif;
    }
    body {
      font-family: var(--font-body);
      color: var(--charcoal);
      background: var(--cream);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    .nav {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo img { display: block; width: auto; height: 44px; }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-links a { font-size: 0.92rem; color: var(--stone); }
    .nav-links a:hover { color: var(--ocean); }
    .nav-cta {
      background: var(--ocean); color: var(--white) !important; padding: 0.5rem 1.1rem;
      border-radius: 999px; font-weight: 700;
    }
    .hero {
      padding: 5.5rem 2rem 2.5rem;
      background: linear-gradient(135deg, rgba(26,74,110,0.96), rgba(42,106,142,0.92));
      color: var(--white);
    }
    .hero-inner { max-width: 960px; margin: 0 auto; }
    .hero-badge {
      display: inline-block; margin-bottom: 1rem; padding: 0.35rem 0.8rem; border-radius: 999px;
      background: rgba(255,255,255,0.14); color: var(--sand); font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700;
    }
    h1,h2,h3 { font-family: var(--font-head); line-height: 1.15; }
    .hero h1 { font-size: clamp(2.3rem, 6vw, 4.4rem); margin-bottom: 1rem; }
    .hero p { color: rgba(255,255,255,0.86); max-width: 58ch; margin-bottom: 1.2rem; }
    .search-form {
      display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 1.5rem;
    }
    .search-input {
      flex: 1 1 320px; min-height: 56px; border-radius: 999px; border: none;
      padding: 0 1.2rem; font-size: 1rem; box-shadow: var(--shadow);
    }
    .search-btn {
      min-height: 56px; border: none; border-radius: 999px; padding: 0 1.5rem;
      background: var(--sand); color: var(--charcoal); font-weight: 700; cursor: pointer;
      box-shadow: var(--shadow-md);
    }
    .section { padding: 3rem 2rem 4rem; }
    .container { max-width: 960px; margin: 0 auto; }
    .search-meta { color: var(--stone); margin-bottom: 1rem; }
    .results { display: grid; gap: 1rem; }
    .result-card {
      background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.05); padding: 1.4rem;
    }
    .result-card h2 { font-size: 1.45rem; margin-bottom: 0.55rem; }
    .result-card p { color: var(--stone); margin-bottom: 0.85rem; }
    .result-link { color: var(--ocean); font-weight: 700; }
    .empty-state {
      background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 1.6rem; color: var(--stone);
    }
    .footer {
      background: var(--charcoal); color: rgba(255,255,255,0.72); padding: 2rem;
      text-align: center;
    }
    .footer a { color: var(--white); }
    @media (max-width: 768px) {
      .nav-inner { padding: 1rem 1.2rem; }
      .nav-links { gap: 1rem; font-size: 0.88rem; }
      .nav-links a:not(.nav-cta) { display: none; }
      .hero, .section { padding-left: 1.2rem; padding-right: 1.2rem; }
      .search-btn, .search-input { width: 100%; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="Pohara home">
        <img src="assets/branding/pohara-logo-clean.png" alt="Pohara" />
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="cafes-restaurants.html">Local</a>
        <a href="booking.html" class="nav-cta">Book a Stay</a>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-inner">
      <span class="hero-badge">Search the site</span>
      <h1>Find what you need around Pohara</h1>
      <p>Search accommodation, beaches, cafes, art galleries, wildlife spots, wineries and local Golden Bay ideas across the site.</p>
      <form class="search-form" id="searchForm" action="search.html" method="get">
        <input class="search-input" id="searchInput" type="search" name="q" placeholder="Search beaches, cafes, walks, booking..." aria-label="Search the Pohara website" />
        <button class="search-btn" type="submit"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
      </form>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <p class="search-meta" id="searchMeta">Type a keyword to search the site.</p>
      <div class="results" id="results"></div>
    </div>
  </section>

  <footer class="footer">
    <p><a href="index.html">Back to Pohara home</a></p>
  </footer>

  <script>
    var pages = [
      {
        title: 'Pohara Accommodation and Things To Do',
        url: 'index.html',
        description: 'Overview of Pohara accommodation, things to do, highlights, hospitality, local activities and reviews.',
        keywords: 'home pohara golden bay accommodation things to do highlights local hospitality activities reviews'
      },
      {
        title: 'Pohara Accommodation Booking',
        url: 'booking.html',
        description: 'Booking information for staying in Pohara, Golden Bay.',
        keywords: 'booking stay accommodation beachfront reserve availability'
      },
      {
        title: 'Best Beaches and Swimming in Golden Bay',
        url: 'beach-swimming.html',
        description: 'Local beaches, calm swimming spots and family-friendly beach ideas around Pohara and Golden Bay.',
        keywords: 'beach swimming pohara golden bay tata ligar totaranui family water'
      },
      {
        title: 'Best Cafes and Restaurants in Pohara and Takaka',
        url: 'cafes-restaurants.html',
        description: 'Local recommendations for coffee, breakfast, lunch, dinner and casual dining in Pohara and Takaka.',
        keywords: 'cafe restaurant coffee breakfast lunch dinner takaka local food dining'
      },
      {
        title: 'Golden Bay Art Galleries and Crafts',
        url: 'art-crafts.html',
        description: 'Art galleries, studios and craft stops around Pohara, Takaka and Golden Bay.',
        keywords: 'art crafts gallery galleries studios pottery estuary arts art vault monza living lights paper scissors rock'
      },
      {
        title: 'Nature and Wildlife in Golden Bay',
        url: 'nature-wildlife.html',
        description: 'Nature walks, wildlife viewing, birdlife, seals and local outdoor experiences in Golden Bay.',
        keywords: 'nature wildlife birds seals stingray walks reserves boat wainui forest'
      },
      {
        title: 'Abel Tasman Coast Track from Pohara',
        url: 'abel-tasman-coast-track.html',
        description: 'Day walk guide and local tips for visiting Abel Tasman from Pohara.',
        keywords: 'abel tasman coast track day walk hiking track national park'
      },
      {
        title: 'Golden Bay Wineries, Cideries and Tasting Stops',
        url: 'wineries-cideries.html',
        description: 'Golden Bay wineries, cideries and tasting stops near Pohara and Takaka.',
        keywords: 'wineries cideries wine cider tasting drinks vineyards'
      }
    ];

    function scorePage(page, terms) {
      var haystack = (page.title + ' ' + page.description + ' ' + page.keywords).toLowerCase();
      var score = 0;
      terms.forEach(function(term) {
        if (page.title.toLowerCase().indexOf(term) !== -1) score += 3;
        if (page.description.toLowerCase().indexOf(term) !== -1) score += 2;
        if (page.keywords.toLowerCase().indexOf(term) !== -1) score += 1;
      });
      return score;
    }

    function renderResults(query) {
      var resultsEl = document.getElementById('results');
      var metaEl = document.getElementById('searchMeta');
      resultsEl.innerHTML = '';

      if (!query) {
        metaEl.textContent = 'Type a keyword to search the site.';
        resultsEl.innerHTML = '<div class="empty-state">Try searches like beaches, booking, cafes, wildlife, Abel Tasman or art.</div>';
        return;
      }

      var terms = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
      var matches = pages.map(function(page) {
        return { page: page, score: scorePage(page, terms) };
      }).filter(function(entry) {
        return entry.score > 0;
      }).sort(function(a, b) {
        return b.score - a.score;
      });

      metaEl.textContent = 'Showing ' + matches.length + ' result' + (matches.length === 1 ? '' : 's') + ' for “' + query + '”.';

      if (!matches.length) {
        resultsEl.innerHTML = '<div class="empty-state">No pages matched that search yet. Try broader terms like beach, food, booking, wildlife or walks.</div>';
        return;
      }

      matches.forEach(function(entry) {
        var card = document.createElement('article');
        card.className = 'result-card';
        card.innerHTML = '<h2><a href="' + entry.page.url + '">' + entry.page.title + '</a></h2>' +
          '<p>' + entry.page.description + '</p>' +
          '<a class="result-link" href="' + entry.page.url + '">Open page <i class="fa-solid fa-arrow-right"></i></a>';
        resultsEl.appendChild(card);
      });
    }

    var params = new URLSearchParams(window.location.search);
    var query = params.get('q') || '';
    document.getElementById('searchInput').value = query;
    renderResults(query);
  </script>
</body>
</html>
